<!DOCTYPE html>
<html>
<head>
  <title>E-commerce</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    nav a { margin-right: 15px; cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 15px; }
    th, td { border: 1px solid #333; padding: 8px; }
    input { margin-right: 10px; padding: 5px; }
    button { padding: 6px 12px; }
  </style>
</head>
<body>

<nav>
  <a onclick="showPage('customers')">Customers</a>
  <a onclick="showPage('products')">Products</a>
  <a onclick="showPage('orders')">Orders</a>
</nav>

<h2 id="title">Customers</h2>

<div id="form"></div>
<div id="table"></div>

<script>
const API = "https://ecommerce-api-theta-nine.vercel.app/api";

// โหลดหน้าแรก
window.onload = () => showPage("customers");

// -------- PAGE SWITCH --------
function showPage(page) {
  document.getElementById("form").innerHTML = "";
  document.getElementById("table").innerHTML = "";
  document.getElementById("title").innerText = page.toUpperCase();

  if (page === "customers") renderCustomers();
  if (page === "products") renderProducts();
  if (page === "orders") renderOrders();
}

// -------- CUSTOMERS --------
function renderCustomers() {
  document.getElementById("form").innerHTML = `
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <button onclick="addCustomer()">Add</button>
  `;
  loadCustomers();
}

async function loadCustomers() {
  try {
    const res = await fetch(`${API}/customers`);
    const data = await res.json();

    let html = `
      <table>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Action</th></tr>
    `;

    data.forEach(c => {
      html += `
        <tr>
          <td>${c.id}</td>
          <td>${c.name}</td>
          <td>${c.email}</td>
          <td><button onclick="deleteCustomer(${c.id})">Delete</button></td>
        </tr>
      `;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById("table").innerHTML = "❌ โหลดข้อมูลไม่ได้";
  }
}

async function addCustomer() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  await fetch(`${API}/customers`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email })
  });

  loadCustomers();
}

async function deleteCustomer(id) {
  await fetch(`${API}/customers/${id}`, { method: "DELETE" });
  loadCustomers();
}

// -------- PRODUCTS --------
function renderProducts() {
  document.getElementById("form").innerHTML = `
    <input id="pname" placeholder="Name">
    <input id="price" placeholder="Price">
    <button onclick="addProduct()">Add</button>
  `;
  loadProducts();
}

async function loadProducts() {
  try {
    const res = await fetch(`${API}/products`);
    const data = await res.json();

    let html = `
      <table>
        <tr><th>ID</th><th>Name</th><th>Price</th><th>Action</th></tr>
    `;

    data.forEach(p => {
      html += `
        <tr>
          <td>${p.id}</td>
          <td>${p.name}</td>
          <td>${p.price}</td>
          <td><button onclick="deleteProduct(${p.id})">Delete</button></td>
        </tr>
      `;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById("table").innerHTML = "❌ โหลดข้อมูลไม่ได้";
  }
}

async function addProduct() {
  const name = document.getElementById("pname").value;
  const price = document.getElementById("price").value;

  await fetch(`${API}/products`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, price })
  });

  loadProducts();
}

async function deleteProduct(id) {
  await fetch(`${API}/products/${id}`, { method: "DELETE" });
  loadProducts();
}

// -------- ORDERS --------
function renderOrders() {
  document.getElementById("form").innerHTML = `
    <input id="cid" placeholder="Customer ID">
    <input id="pid" placeholder="Product ID">
    <input id="qty" placeholder="Quantity">
    <button onclick="addOrder()">Add</button>
  `;
  loadOrders();
}

async function loadOrders() {
  try {
    const res = await fetch(`${API}/orders`);
    const data = await res.json();

    let html = `
      <table>
        <tr><th>ID</th><th>Customer</th><th>Product</th><th>Qty</th><th>Action</th></tr>
    `;

    data.forEach(o => {
      html += `
        <tr>
          <td>${o.id}</td>
          <td>${o.customer_id}</td>
          <td>${o.product_id}</td>
          <td>${o.quantity}</td>
          <td><button onclick="deleteOrder(${o.id})">Delete</button></td>
        </tr>
      `;
    });

    html += "</table>";
    document.getElementById("table").innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById("table").innerHTML = "❌ โหลดข้อมูลไม่ได้";
  }
}

async function addOrder() {
  const customer_id = document.getElementById("cid").value;
  const product_id = document.getElementById("pid").value;
  const quantity = document.getElementById("qty").value;

  await fetch(`${API}/orders`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ customer_id, product_id, quantity })
  });

  loadOrders();
}

async function deleteOrder(id) {
  await fetch(`${API}/orders/${id}`, { method: "DELETE" });
  loadOrders();
}
</script>

</body>
</html>
